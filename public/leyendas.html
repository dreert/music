<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
   <title>LEGENDS M/L</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sliders | CodeArry</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <link rel="stylesheet" href="css/leyendas.css">
  <link rel="icon" href="music-line logo.png" type="image/png">
</head>
<body>

  <a href="the lobby.html">
    <button id="btn-regresar">regresar</button>
  </a>

  <main class="main-slides">
    <div class="swiper">
      <div class="swiper-wrapper">

        <div class="swiper-slide" data-url="biografias/michael_jackson.html">
          <img src="fotos l/michael leyenda.jpg" alt="Michael Jackson">
          <div class="slide-info">
            <h1 class="slide-title">Michael Jackson</h1>
            <h2 class="slide-desc">KING OF POP</h2>
          </div>
        </div>

        <div class="swiper-slide" data-url="biografias/diomedes_diaz.html">
          <img src="fotos l/DIOMEDES.jpg" alt="Diomedes Diaz">
          <div class="slide-info">
            <h1 class="slide-title">Diomedes Diaz</h1>
            <h2 class="slide-desc">EL CACIQUE DE LA JUNTA</h2>
          </div>
        </div>

        <div class="swiper-slide" data-url="biografias/tupac_shakur.html">
          <img src="fotos l/tupac.jpg" alt="Tupac">
          <div class="slide-info">
            <h1 class="slide-title">Tupac</h1>
            <h2 class="slide-desc">THE RAP POET</h2>
          </div>
        </div>

      </div>

      <div class="swiper-button-prev"></div>
      <div class="swiper-button-next"></div>
      <div class="swiper-pagination"></div>
    </div>
  </main>
 <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="js/leyendas.js"></script>
</body>
</html>
